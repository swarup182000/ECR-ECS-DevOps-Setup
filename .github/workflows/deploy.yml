name: Deploy Docker App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t badsha .

      - name: Save Docker Image
        run: docker save badsha -o badsha.tar

      - name: Copy Image to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "badsha.tar"
          target: "/home/ubuntu/"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
         script: |
           sudo docker load -i badsha.tar
           sudo docker stop badsha || true
           sudo docker rm badsha || true
           sudo docker run -d -p 8080:80 --name badsha badsha
